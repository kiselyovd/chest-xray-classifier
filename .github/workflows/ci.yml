name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --all-groups --python ${{ matrix.python-version }}
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src scripts
      - name: Deptry
        run: uv run deptry .
      - name: Bandit
        run: uv run bandit -r src scripts -c pyproject.toml
      - name: Interrogate
        run: uv run interrogate -c pyproject.toml src scripts
      - name: Pytest
        run: uv run pytest
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build training image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: training
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: serving
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
